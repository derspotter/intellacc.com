services:
  postfix:
    image: boky/postfix:latest
    container_name: postfix
    environment:
      HOSTNAME: mail.intellacc.com
      ALLOWED_SENDER_DOMAINS: intellacc.com
    volumes:
      - ./postfix/keys:/etc/opendkim/keys:ro
    networks:
      - intellacc-network

  db:
    image: pgvector/pgvector:pg18
    container_name: intellacc_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db-data-pg18:/var/lib/postgresql
    networks:
      - intellacc-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellacc_backend
    environment:
      INTELLACC_STACK: production
      NODE_ENV: ${NODE_ENV}
      PORT: ${NODE_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      ATPROTO_OAUTH_CLIENT_ID: ${ATPROTO_OAUTH_CLIENT_ID:-}
      ATPROTO_OAUTH_SCOPES: "${ATPROTO_OAUTH_SCOPES:-atproto transition:generic}"
      MASTODON_OAUTH_SCOPES: "${MASTODON_OAUTH_SCOPES:-read:accounts}"
      SOCIAL_AUTH_STATE_TTL_SECONDS: ${SOCIAL_AUTH_STATE_TTL_SECONDS:-600}
      ATPROTO_CREDENTIAL_SECRET: ${ATPROTO_CREDENTIAL_SECRET:-}
      ATPROTO_WORKER_INTERVAL_MS: ${ATPROTO_WORKER_INTERVAL_MS:-15000}
      FRONTEND_URL: ${FRONTEND_URL}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION}
      REGISTRATION_APPROVAL_REQUIRED: ${REGISTRATION_APPROVAL_REQUIRED}
      REGISTRATION_APPROVER_EMAIL: ${REGISTRATION_APPROVER_EMAIL}
      REGISTRATION_APPROVAL_TTL_HOURS: ${REGISTRATION_APPROVAL_TTL_HOURS}
      REGISTRATION_APPROVAL_SECRET: ${REGISTRATION_APPROVAL_SECRET}
      REGISTRATION_APPROVAL_RESEND_COOLDOWN_MINUTES: ${REGISTRATION_APPROVAL_RESEND_COOLDOWN_MINUTES:-10}
      REGISTRATION_APPROVAL_MAX_PENDING: ${REGISTRATION_APPROVAL_MAX_PENDING:-1}
      EMAIL_TOKEN_SECRET: ${EMAIL_TOKEN_SECRET}
      PASSWORD_RESET_SECRET: ${PASSWORD_RESET_SECRET}
      PASSWORD_RESET_EXPIRY: ${PASSWORD_RESET_EXPIRY}
      PASSWORD_RESET_DELAY_HOURS: ${PASSWORD_RESET_DELAY_HOURS}
      PASSWORD_RESET_POLL_INTERVAL_MS: ${PASSWORD_RESET_POLL_INTERVAL_MS}
      PASSWORD_RESET_COOLDOWN_SECONDS: ${PASSWORD_RESET_COOLDOWN_SECONDS}
      CRON_SHARED_SECRET: ${CRON_SHARED_SECRET:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-false}
      PHONE_VERIFICATION_ENABLED: ${PHONE_VERIFICATION_ENABLED:-true}
      PHONE_HASH_SALT: ${PHONE_HASH_SALT:-}
      PHONE_CODE_HASH_SALT: ${PHONE_CODE_HASH_SALT:-}
      DEV_PHONE_CODE: ${DEV_PHONE_CODE:-}
      PHONE_CODE_TTL_MINUTES: ${PHONE_CODE_TTL_MINUTES:-}
      PHONE_CODE_MAX_ATTEMPTS: ${PHONE_CODE_MAX_ATTEMPTS:-}
      REQUIRE_TWILIO_VERIFICATION: ${REQUIRE_TWILIO_VERIFICATION:-false}
      TWILIO_SID: ${TWILIO_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID:-}
      SMS_GATEWAY_URL: ${SMS_GATEWAY_URL:-}
      SMS_GATEWAY_USERNAME: ${SMS_GATEWAY_USERNAME:-}
      SMS_GATEWAY_PASSWORD: ${SMS_GATEWAY_PASSWORD:-}
      SMS_GATEWAY_TIMEOUT_MS: ${SMS_GATEWAY_TIMEOUT_MS:-}
      OPENCLAW_URL: ${OPENCLAW_URL:-}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-}
      OPENCLAW_CLI_BIN: ${OPENCLAW_CLI_BIN:-}
      OPENCLAW_CLI_ARGS: ${OPENCLAW_CLI_ARGS:-}
      OPENCLAW_TIMEOUT_MS: ${OPENCLAW_TIMEOUT_MS:-}
      PAYMENT_VERIFICATION_ENABLED: ${PAYMENT_VERIFICATION_ENABLED:-true}
      REQUIRE_STRIPE_VERIFICATION: ${REQUIRE_STRIPE_VERIFICATION:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PREDICTION_ENGINE_AUTH_TOKEN: ${PREDICTION_ENGINE_AUTH_TOKEN}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      POST_SIGNAL_REWARDS_ENABLED: ${POST_SIGNAL_REWARDS_ENABLED:-false}
      POST_SIGNAL_AGENTIC_MATCH_ENABLED: ${POST_SIGNAL_AGENTIC_MATCH_ENABLED}
      POST_SIGNAL_MATCH_GATE_ENABLED: ${POST_SIGNAL_MATCH_GATE_ENABLED}
      POST_SIGNAL_MATCH_GATE_FALLBACK_MODELS: ${POST_SIGNAL_MATCH_GATE_FALLBACK_MODELS:-}
      POST_SIGNAL_MATCH_GATE_TIMEOUT_MS: ${POST_SIGNAL_MATCH_GATE_TIMEOUT_MS:-}
      POST_SIGNAL_MATCH_REASONER_ENABLED: ${POST_SIGNAL_MATCH_REASONER_ENABLED}
      POST_SIGNAL_MATCH_REASONER_MODEL: ${POST_SIGNAL_MATCH_REASONER_MODEL}
      POST_SIGNAL_MATCH_REASONER_FALLBACK_MODELS: ${POST_SIGNAL_MATCH_REASONER_FALLBACK_MODELS}
      POST_SIGNAL_MATCH_REASONER_MAX_TOKENS: ${POST_SIGNAL_MATCH_REASONER_MAX_TOKENS}
      POST_SIGNAL_MATCH_REASONING_MAX_TOKENS: ${POST_SIGNAL_MATCH_REASONING_MAX_TOKENS}
      POST_SIGNAL_MATCH_REASONER_TIMEOUT_MS: ${POST_SIGNAL_MATCH_REASONER_TIMEOUT_MS}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./src:/usr/src/app/src    # Only mount source code for live updates
      - ./test:/usr/src/app/test  # for testing
      - ./migrations:/usr/src/app/migrations  # mount migrations for auto-run
      - ./uploads:/usr/src/app/uploads
    working_dir: /usr/src/app
    ports:
      - "${NODE_PORT}:3000"
    command: ["./scripts/docker-dev-entrypoint.sh"]
    depends_on:
      - db
    networks:
      - intellacc-network

