services:
  prediction-engine-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - TEST_DB_ADMIN_URL=postgresql://postgres:password@db:5432/postgres
      - TEST_DB_URL=postgresql://postgres:password@db:5432/test_intellacc
    depends_on:
      - db
    command: >-
      bash -c "export PATH=/usr/local/cargo/bin:$PATH; export PGPASSWORD=password; until pg_isready -h db -U postgres; do sleep 1; done; cargo test ${CARGO_TEST_ARGS:---lib -- --nocapture --skip stress::tests::test_comprehensive_market_simulation}"

  db:
    image: pgvector/pgvector:pg18
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=test_intellacc
    volumes:
      - prediction_engine_test_db:/var/lib/postgresql

volumes:
  prediction_engine_test_db:
