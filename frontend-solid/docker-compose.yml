services:
  frontend-solid:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellacc_frontend_solid
    command: sh -lc "npm ci --legacy-peer-deps && npm run build && npm run preview -- --host 0.0.0.0 --port 4174"
    environment:
      VITE_API_PROXY_TARGET: http://intellacc_backend:3000
      VITE_SERVER_PORT: 4174
      VITE_HMR_CLIENT_PORT: 4174
    ports:
      - "4174:4174"
    volumes:
      - .:/app
      - ../shared:/shared
      - ../shared/openmls-pkg:/shared/openmls-pkg
      - frontend_solid_node_modules:/app/node_modules
    networks:
      - intellacc-network

volumes:
  frontend_solid_node_modules:

networks:
  intellacc-network:
    external: true
